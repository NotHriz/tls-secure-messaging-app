<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConfeNon - The Secret Lobby</title>
    <!-- Keeping your original stylesheet link just in case -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Dark, mysterious theme for the Confession Lobby */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
        }
        .app-container { display: flex; width: 100%; height: 100%; }
        .sidebar { background-color: #1a1a1a; width: 260px; padding: 20px; border-right: 1px solid #333; }
        .sidebar-brand { display: flex; align-items: center; gap: 10px; color: #bb86fc; margin-bottom: 20px;}
        .crypto-status { font-size: 0.85em; color: #03dac6; margin-bottom: 30px; display: flex; align-items: center; gap: 5px;}
        .dot { height: 8px; width: 8px; background-color: #03dac6; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #03dac6;}
        .sidebar-menu { display: flex; flex-direction: column; gap: 10px; }
        .menu-item { color: #aaa; text-decoration: none; padding: 10px; border-radius: 5px; display: flex; align-items: center; gap: 10px; }
        .menu-item:hover, .menu-item.active { background-color: #333; color: #fff; }
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background-color: #121212; }
        .chat-header { padding: 20px; background-color: #1e1e1e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .channel-title { color: #bb86fc; font-weight: bold; font-size: 1.2em; }
        .secure-tag { background: #2c2c2c; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; color: #03dac6; border: 1px solid #03dac6; }
        .chat-feed { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .msg-row.outgoing { flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; background-color: #333; }
        .user-y { background-color: #bb86fc; color: #000; }
        .user-a { background-color: #444; color: #fff; }
        .msg-block { max-width: 70%; }
        .msg-meta { font-size: 0.8em; color: #888; margin-bottom: 5px; display: flex; gap: 10px; }
        .msg-row.outgoing .msg-meta { justify-content: flex-end; }
        .msg-bubble { padding: 12px 16px; border-radius: 8px; background-color: #2a2a2a; color: #e0e0e0; line-height: 1.4; border: 1px solid #444; }
        .msg-row.outgoing .msg-bubble { background-color: #311b5e; border: 1px solid #bb86fc; }
        .chat-footer { padding: 20px; background-color: #1e1e1e; border-top: 1px solid #333; }
        .input-container { display: flex; gap: 10px; background-color: #2a2a2a; padding: 10px; border-radius: 8px; align-items: flex-end; }
        textarea { flex-grow: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-family: inherit; padding: 5px; }
        .send-btn { background-color: #bb86fc; color: #000; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background-color: #9965f4; }
        .icon-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-user-secret"></i>
                </div>
                <h2>ConfeNon</h2>
            </div>

            <div class="crypto-status" title="Your identity is protected">
                <span class="dot"></span> TLS 1.3 Anonymous Connection
            </div>

            <nav class="sidebar-menu">
                <a href="#" class="menu-item active">
                    <i class="fa-solid fa-mask"></i> Lobby
                </a>
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-ghost"></i> Recent Whispers
                </a>
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-shield-halved"></i> Safety Rules
                </a>
            </nav>
        </aside>

        <main class="main-chat">
            <header class="chat-header">
                <div class="channel-title">
                    <i class="fa-solid fa-fire-flame-curved"></i> midnight-confessions
                </div>
                <div class="header-actions">
                    <span class="secure-tag"><i class="fa-solid fa-eye-slash"></i> Identity Hidden</span>
                    <button class="icon-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </header>

            <section class="chat-feed" id="chatFeed">
                <div style="text-align: center; color: #666; font-size: 0.9em; margin: 10px 0;">
                    <span>— Entering the secure lobby. No logs are kept. —</span>
                </div>
                <div id="msgList" class="message-list">
                    <!-- Messages will appear here -->
                </div>
            </section>

            <footer class="chat-footer">
                <div class="input-container">
                    <textarea id="msgInput" placeholder="Drop your confession here anonymously..." rows="2"></textarea>
                    <div class="input-actions" style="display: flex; align-items: center; gap: 15px;">
                        <button id="sendBtn" class="send-btn">
                            <i class="fa-solid fa-paper-plane"></i> Confess
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script>
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const msgList = document.getElementById('msgList');
        const chatFeed = document.getElementById('chatFeed');

        // 1. Assign a unique, persistent "Anonymous" name
        if (!localStorage.getItem('chatUsername')) {
            const randomID = Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('chatUsername', `Ghost_${randomID}`);
        }
        const myUsername = localStorage.getItem('chatUsername');

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            
            msgInput.value = '';
            appendLocalMessage(text);

            // Send to server
            await fetch('/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: myUsername,
                    text: text
                })
            });
            
            loadMessages();
        }

        function appendLocalMessage(text) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgHtml = `
                <div class="msg-row outgoing">
                    <div class="avatar user-y"><i class="fa-solid fa-user-ninja"></i></div>
                    <div class="msg-block">
                        <div class="msg-meta"><span class="time">${time}</span> <span class="username">You (${myUsername})</span></div>
                        <div class="msg-bubble">${text}</div>
                    </div>
                </div>`;
            msgList.insertAdjacentHTML('beforeend', msgHtml);
            scrollToBottom();
        }

       async function loadMessages() {
               try {
                   const res = await fetch('/messages');
                   const data = await res.json(); 
                   const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                   
                   msgList.innerHTML = data.map((msg) => {
                       let senderName = 'Unknown';
                       let messageText = '';

                       if (msg && typeof msg === 'object') {
                           senderName = msg.username || 'Unknown';
                           messageText = msg.text || '';
                       } else if (typeof msg === 'string') {
                           senderName = 'System'; 
                           messageText = msg;
                       }

                       const isYou = senderName === myUsername; 
                       const displayName = isYou ? `You (${senderName})` : senderName;
                       const icon = isYou ? '<i class="fa-solid fa-user-ninja"></i>' : '<i class="fa-solid fa-mask"></i>';
                       
                       return `
                           <div class="msg-row ${isYou ? 'outgoing' : 'incoming'}">
                               <div class="avatar ${isYou ? 'user-y' : 'user-a'}">${icon}</div>
                               <div class="msg-block">
                                   <div class="msg-meta">
                                       <span class="username">${displayName}</span> 
                                       <span class="time">${time}</span>
                                   </div>
                                   <div class="msg-bubble">${messageText}</div>
                               </div>
                           </div>
                       `;
                   }).join('');
                   
                   scrollToBottom();
               } catch (err) {
                   console.error("Error updating chat feed", err);
               }
           }

        function scrollToBottom() {
            chatFeed.scrollTop = chatFeed.scrollHeight;
        }

        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        loadMessages();
        setInterval(loadMessages, 2000);
    </script>
</body>
</html>
